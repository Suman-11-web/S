<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>Agriculture Aushadhi | Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #f4fdf4; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.6); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .particle { position: fixed; border-radius: 50%; background: #22c55e; opacity: 0.2; pointer-events: none; animation: floatUp 15s infinite linear; }
        @keyframes floatUp { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.3; } 90% { opacity: 0.3; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
        
        .search-bar:focus-within { transform: scale(1.02); box-shadow: 0 20px 25px -5px rgba(34, 197, 94, 0.1); border-color: #22c55e; }
    </style>
</head>
<body class="text-gray-800 pb-28 min-h-screen relative selection:bg-green-200">

    <div class="particle w-4 h-4 left-[10%]"></div>
    <div class="particle w-6 h-6 left-[30%]" style="animation-duration: 20s;"></div>

    <nav class="fixed top-4 inset-x-0 mx-auto w-[95%] max-w-7xl glass-panel shadow-sm rounded-full px-6 py-4 flex justify-between items-center z-40 transition-all">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-green-400 to-green-600 rounded-full flex items-center justify-center shadow-lg"><i class="ph-bold ph-plant text-white text-xl"></i></div>
            <h1 class="text-xl md:text-2xl font-extrabold tracking-tight text-gray-900">AgriAushadhi</h1>
        </div>
        
        <div class="hidden md:flex items-center gap-6">
            <button onclick="openTrackModal()" class="text-gray-600 hover:text-green-600 font-bold transition-colors flex items-center gap-2"><i class="ph-bold ph-magnifying-glass-location text-xl"></i> Track Order</button>
            <a href="./login1.html" class="bg-gray-900 hover:bg-green-600 text-white px-5 py-2.5 rounded-full font-bold text-sm transition-all shadow-md">Admin Login</a>
        </div>
    </nav>

    <div class="pt-32 px-6 max-w-4xl mx-auto text-center relative z-10">
        <h2 class="text-4xl md:text-6xl font-black text-gray-900 mb-6 leading-tight">Protect & Grow<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-green-500 to-emerald-700">Your Crops Faster</span></h2>
    </div>

    <main class="p-6 max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8" id="product-grid">
        <div class="product-card bg-white rounded-[2rem] shadow-sm hover:shadow-xl transition-all duration-500 border border-gray-50 flex flex-col overflow-hidden group" data-name="premium fertilizer" data-category="Fertilizers">
            <div class="h-56 bg-gradient-to-b from-gray-50 to-white p-6 flex items-center justify-center relative overflow-hidden">
                <span class="absolute top-4 left-4 bg-white/80 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase text-gray-600 z-10 shadow-sm border border-gray-100">Fertilizers</span>
                <div class="text-6xl group-hover:scale-110 transition-transform duration-700 drop-shadow-lg">🌱</div>
            </div>
            <div class="p-6 flex-1 flex flex-col relative bg-white z-10">
                <h2 class="text-xl font-extrabold mb-2 text-gray-900 leading-tight">Premium Fertilizer</h2>
                <p class="text-sm text-gray-500 mb-6 line-clamp-2 flex-1">Boosts crop yield organically.</p>
                <div class="flex justify-between items-end mt-auto pt-4 border-t border-gray-50">
                    <p class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-700 to-gray-900">₹450</p>
                    <button onclick="openModal('Premium Fertilizer', '450')" class="w-12 h-12 bg-gray-900 text-white rounded-full flex items-center justify-center hover:bg-green-600 hover:shadow-lg transition-all hover:-translate-y-1"><i class="ph-bold ph-shopping-cart-simple text-xl"></i></button>
                </div>
            </div>
        </div>
        
        <div class="product-card bg-white rounded-[2rem] shadow-sm hover:shadow-xl transition-all duration-500 border border-gray-50 flex flex-col overflow-hidden group" data-name="organic seeds" data-category="Seeds">
            <div class="h-56 bg-gradient-to-b from-gray-50 to-white p-6 flex items-center justify-center relative overflow-hidden">
                <span class="absolute top-4 left-4 bg-white/80 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase text-gray-600 z-10 shadow-sm border border-gray-100">Seeds</span>
                <div class="text-6xl group-hover:scale-110 transition-transform duration-700 drop-shadow-lg">🌾</div>
            </div>
            <div class="p-6 flex-1 flex flex-col relative bg-white z-10">
                <h2 class="text-xl font-extrabold mb-2 text-gray-900 leading-tight">Organic Seeds</h2>
                <p class="text-sm text-gray-500 mb-6 line-clamp-2 flex-1">High-quality, fast-germinating seeds.</p>
                <div class="flex justify-between items-end mt-auto pt-4 border-t border-gray-50">
                    <p class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-700 to-gray-900">₹120</p>
                    <button onclick="openModal('Organic Seeds', '120')" class="w-12 h-12 bg-gray-900 text-white rounded-full flex items-center justify-center hover:bg-green-600 hover:shadow-lg transition-all hover:-translate-y-1"><i class="ph-bold ph-shopping-cart-simple text-xl"></i></button>
                </div>
            </div>
        </div>
    </main>

    <div id="payment-modal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-md z-50 hidden flex justify-center items-end sm:items-center opacity-0 transition-opacity">
        <div id="modal-content" class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl transform translate-y-full transition-transform duration-500 relative overflow-y-auto max-h-[90vh] no-scrollbar">
            <button onclick="closeModal()" class="absolute top-6 right-6 w-10 h-10 bg-gray-50 hover:bg-red-50 hover:text-red-500 text-gray-400 rounded-full flex items-center justify-center transition-colors"><i class="ph-bold ph-x text-lg"></i></button>
            <h3 class="text-2xl font-extrabold text-gray-900 mb-4">Secure Checkout</h3>
            
            <form id="checkout-form" action="#" onsubmit="alert('As this is hosted on GitHub Pages (static), checkout backend is disabled.'); return false;" class="space-y-4">
                <input type="hidden" name="product_name" id="modal-prod-name">
                <div class="bg-gradient-to-br from-green-50 to-emerald-50 rounded-2xl p-4 mb-4 border border-green-100/50">
                    <p class="font-bold text-gray-800" id="display-prod-name"></p>
                    <p class="text-2xl font-black text-gray-900" id="display-prod-price"></p>
                </div>
                
                <input type="text" name="cust_name" required placeholder="Full Name" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-green-500 outline-none transition-all">
                
                <div class="bg-gray-50 rounded-2xl p-5 text-center border border-dashed border-gray-200">
                    <p class="text-xs font-bold mb-2 text-gray-500 uppercase tracking-wider">Scan QR to Pay</p>
                    <img src="./qr.png" class="w-28 h-28 mx-auto bg-white p-2 rounded-xl shadow-sm mb-3" alt="Payment QR Code">
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-gray-900 text-white py-4 rounded-xl font-bold text-sm hover:bg-green-600 transition-all shadow-lg flex justify-center items-center gap-2 group">
                    <span id="submit-text">Confirm Order (Demo)</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        function openModal(name, price) {
            document.getElementById('modal-prod-name').value = name;
            document.getElementById('display-prod-name').innerText = name;
            document.getElementById('display-prod-price').innerText = '₹' + price;
            const modal = document.getElementById('payment-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('translate-y-full'); }, 10);
        }
        function closeModal() { 
            const modal = document.getElementById('payment-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('opacity-0'); content.classList.add('translate-y-full');
            setTimeout(() => { modal.classList.add('hidden'); document.getElementById('checkout-form').reset(); }, 300);
        }
    </script>
</body>
</html>
