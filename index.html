<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>Agriculture Aushadhi | Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #f4fdf4; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.6); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Animated Agriculture Background Particles */
        .particle { position: fixed; border-radius: 50%; background: #22c55e; opacity: 0.2; pointer-events: none; animation: floatUp 15s infinite linear; }
        @keyframes floatUp { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.3; } 90% { opacity: 0.3; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
        
        .search-bar:focus-within { transform: scale(1.02); box-shadow: 0 20px 25px -5px rgba(34, 197, 94, 0.1); border-color: #22c55e; }
    </style>
</head>
<body class="text-gray-800 pb-28 min-h-screen relative selection:bg-green-200">

    <div class="particle w-4 h-4 left-[10%] animation-delay-0"></div>
    <div class="particle w-6 h-6 left-[30%] animation-delay-2000" style="animation-duration: 20s;"></div>
    <div class="particle w-3 h-3 left-[70%] animation-delay-4000" style="animation-duration: 12s;"></div>
    <div class="particle w-8 h-8 left-[85%] animation-delay-1000" style="animation-duration: 25s; opacity: 0.1;"></div>

    <nav class="fixed top-4 inset-x-0 mx-auto w-[95%] max-w-7xl glass-panel shadow-sm rounded-full px-6 py-4 flex justify-between items-center z-40 transition-all">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-green-400 to-green-600 rounded-full flex items-center justify-center shadow-lg"><i class="ph-bold ph-plant text-white text-xl"></i></div>
            <h1 class="text-xl md:text-2xl font-extrabold tracking-tight text-gray-900">AgriAushadhi</h1>
        </div>
        
        <div class="hidden md:flex items-center gap-6">
            <button onclick="openTrackModal()" class="text-gray-600 hover:text-green-600 font-bold transition-colors flex items-center gap-2"><i class="ph-bold ph-magnifying-glass-location text-xl"></i> Track Order</button>
            <a href="/login" class="bg-gray-900 hover:bg-green-600 text-white px-5 py-2.5 rounded-full font-bold text-sm transition-all shadow-md">Admin Login</a>
        </div>

        <button onclick="toggleMenu()" class="md:hidden w-10 h-10 flex items-center justify-center bg-gray-100 hover:bg-green-100 text-gray-700 hover:text-green-700 rounded-full transition-all">
            <i class="ph-bold ph-list text-xl"></i>
        </button>
    </nav>

    <div id="side-menu" class="md:hidden fixed inset-y-0 right-0 w-72 bg-white/90 backdrop-blur-xl shadow-2xl z-50 transform translate-x-full transition-transform duration-500 p-6 flex flex-col">
        <div class="flex justify-end mb-8">
            <button onclick="toggleMenu()" class="p-2 bg-gray-100 rounded-full text-gray-500 hover:text-red-500"><i class="ph-bold ph-x text-lg"></i></button>
        </div>
        <div class="flex flex-col gap-4">
            <button onclick="toggleMenu(); openTrackModal();" class="flex items-center gap-3 p-4 rounded-2xl hover:bg-green-50 text-gray-700 font-bold transition-colors text-left"><i class="ph-bold ph-magnifying-glass-location text-2xl text-green-600"></i> Track My Order</button>
            <a href="/login" class="flex items-center gap-3 p-4 rounded-2xl hover:bg-gray-50 text-gray-700 font-bold transition-colors"><i class="ph-bold ph-shield-check text-2xl text-gray-900"></i> Admin Dashboard</a>
        </div>
    </div>
    <div id="menu-overlay" onclick="toggleMenu()" class="md:hidden fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity"></div>

    <div class="pt-32 px-6 max-w-4xl mx-auto text-center relative z-10">
        <h2 class="text-4xl md:text-6xl font-black text-gray-900 mb-6 leading-tight">Protect & Grow<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-green-500 to-emerald-700">Your Crops Faster</span></h2>
        
        <div class="relative w-full max-w-2xl mx-auto search-bar transition-all duration-300 bg-white rounded-full shadow-lg border border-gray-100 flex items-center p-2 md:p-3">
            <i class="ph-bold ph-magnifying-glass text-gray-400 text-xl ml-3"></i>
            <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Search fertilizers, seeds, pesticides..." class="w-full bg-transparent border-none px-4 py-2 font-medium focus:outline-none text-gray-700 md:text-lg">
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 mt-12 flex justify-center">
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-4" id="category-container">
            <button onclick="setCategory('All')" class="cat-btn bg-green-600 text-white px-6 py-2.5 rounded-full font-bold text-sm whitespace-nowrap shadow-md shadow-green-500/30 transition-all">All Products</button>
            <button onclick="setCategory('Fertilizers')" class="cat-btn bg-white text-gray-600 px-6 py-2.5 rounded-full font-bold text-sm whitespace-nowrap shadow-sm hover:bg-green-50 transition-all border border-gray-100">Fertilizers</button>
            <button onclick="setCategory('Pesticides')" class="cat-btn bg-white text-gray-600 px-6 py-2.5 rounded-full font-bold text-sm whitespace-nowrap shadow-sm hover:bg-green-50 transition-all border border-gray-100">Pesticides</button>
            <button onclick="setCategory('Seeds')" class="cat-btn bg-white text-gray-600 px-6 py-2.5 rounded-full font-bold text-sm whitespace-nowrap shadow-sm hover:bg-green-50 transition-all border border-gray-100">Seeds</button>
            <button onclick="setCategory('Tools')" class="cat-btn bg-white text-gray-600 px-6 py-2.5 rounded-full font-bold text-sm whitespace-nowrap shadow-sm hover:bg-green-50 transition-all border border-gray-100">Tools</button>
        </div>
    </div>

    <main class="p-6 max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8" id="product-grid">
        {% for p in products %}
        <div class="product-card bg-white rounded-[2rem] shadow-sm hover:shadow-xl transition-all duration-500 border border-gray-50 flex flex-col overflow-hidden group" data-name="{{ p.name | lower }}" data-category="{{ p.category }}">
            <div class="h-56 bg-gradient-to-b from-gray-50 to-white p-6 flex items-center justify-center relative overflow-hidden">
                <span class="absolute top-4 left-4 bg-white/80 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase text-gray-600 z-10 shadow-sm border border-gray-100">{{ p.category }}</span>
                <img src="{{ p.image }}" class="max-h-full object-contain mix-blend-multiply group-hover:scale-110 transition-transform duration-700 drop-shadow-lg">
            </div>
            <div class="p-6 flex-1 flex flex-col relative bg-white z-10">
                <h2 class="text-xl font-extrabold mb-2 text-gray-900 leading-tight">{{ p.name }}</h2>
                <p class="text-sm text-gray-500 mb-6 line-clamp-2 flex-1">{{ p.desc }}</p>
                <div class="flex justify-between items-end mt-auto pt-4 border-t border-gray-50">
                    <p class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-700 to-gray-900">₹{{ p.price }}</p>
                    <button onclick="openModal('{{ p.name }}', '{{ p.price }}')" class="w-12 h-12 bg-gray-900 text-white rounded-full flex items-center justify-center hover:bg-green-600 hover:shadow-lg hover:shadow-green-500/40 transition-all hover:-translate-y-1"><i class="ph-bold ph-shopping-cart-simple text-xl"></i></button>
                </div>
            </div>
        </div>
        {% endfor %}
    </main>

    <div id="track-modal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-md z-50 hidden flex justify-center items-end sm:items-center opacity-0 transition-opacity">
        <div id="track-content" class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl transform translate-y-full transition-transform duration-500 relative">
            <button onclick="closeTrackModal()" class="absolute top-6 right-6 w-10 h-10 bg-gray-50 hover:bg-red-50 hover:text-red-500 text-gray-400 rounded-full flex items-center justify-center transition-colors"><i class="ph-bold ph-x text-lg"></i></button>
            <h3 class="text-2xl font-extrabold text-gray-900 mb-6 flex items-center gap-2"><i class="ph-fill ph-magnifying-glass-location text-green-500"></i> Track Order</h3>
            
            <div class="flex gap-2 mb-6">
                <input type="tel" id="track-phone" placeholder="Enter Mobile Number" class="flex-1 bg-gray-50 border border-gray-200 rounded-full px-5 py-3 text-sm font-bold focus:outline-none focus:border-green-500">
                <button onclick="fetchTracking()" class="bg-gray-900 text-white px-6 rounded-full font-bold hover:bg-green-600 transition-colors">Find</button>
            </div>
            <div id="track-results" class="space-y-4 max-h-64 overflow-y-auto no-scrollbar"></div>
        </div>
    </div>

    <div id="payment-modal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-md z-50 hidden flex justify-center items-end sm:items-center opacity-0 transition-opacity">
        <div id="modal-content" class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl transform translate-y-full transition-transform duration-500 relative overflow-y-auto max-h-[90vh] no-scrollbar">
            <button onclick="closeModal()" class="absolute top-6 right-6 w-10 h-10 bg-gray-50 hover:bg-red-50 hover:text-red-500 text-gray-400 rounded-full flex items-center justify-center transition-colors"><i class="ph-bold ph-x text-lg"></i></button>
            <h3 class="text-2xl font-extrabold text-gray-900 mb-4">Secure Checkout</h3>
            
            <form id="checkout-form" action="/submit_order" method="POST" enctype="multipart/form-data" class="space-y-4">
                <input type="hidden" name="product_name" id="modal-prod-name">
                <div class="bg-gradient-to-br from-green-50 to-emerald-50 rounded-2xl p-4 mb-4 border border-green-100/50">
                    <p class="font-bold text-gray-800" id="display-prod-name"></p>
                    <p class="text-2xl font-black text-gray-900" id="display-prod-price"></p>
                </div>
                
                <input type="text" name="cust_name" required placeholder="Full Name" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-green-500 outline-none transition-all">
                <input type="tel" name="cust_phone" required placeholder="Phone Number" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-green-500 outline-none transition-all">
                <textarea name="cust_address" required placeholder="Full Delivery Address (House, Street, PIN)" rows="2" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium resize-none focus:ring-2 focus:ring-green-500 outline-none transition-all"></textarea>
                
                <div class="bg-gray-50 rounded-2xl p-5 text-center border border-dashed border-gray-200">
                    <p class="text-xs font-bold mb-2 text-gray-500 uppercase tracking-wider">Scan QR to Pay</p>
                    <img src="{{ url_for('static', filename='qr.png') }}" class="w-28 h-28 mx-auto bg-white p-2 rounded-xl shadow-sm mb-3">
                    <div class="relative overflow-hidden w-full">
                        <input type="file" name="screenshot" id="screenshot-input" accept="image/*" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div id="upload-ui" class="bg-green-100 text-green-700 hover:bg-green-200 font-bold py-2.5 rounded-xl text-sm transition-all flex items-center justify-center gap-2">
                            <i class="ph-bold ph-upload-simple text-lg"></i> Upload Screenshot
                        </div>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-gray-900 text-white py-4 rounded-xl font-bold text-sm hover:bg-green-600 transition-all shadow-lg flex justify-center items-center gap-2 group">
                    <span id="submit-text">Confirm & Send to WhatsApp</span>
                    <i class="ph-bold ph-paper-plane-tilt group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        // JS logic remains unchanged from previous version
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            if(menu.classList.contains('translate-x-full')) {
                menu.classList.remove('translate-x-full');
                overlay.classList.remove('hidden'); setTimeout(()=>overlay.classList.remove('opacity-0'), 10);
            } else {
                menu.classList.add('translate-x-full');
                overlay.classList.add('opacity-0'); setTimeout(()=>overlay.classList.add('hidden'), 300);
            }
        }

        let currentCategory = 'All';
        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                if(btn.innerText === cat || (cat==='All' && btn.innerText==='All Products')) {
                    btn.className = "cat-btn bg-green-600 text-white px-6 py-2.5 rounded-full font-bold text-sm whitespace-nowrap shadow-md shadow-green-500/30 transition-all";
                } else {
                    btn.className = "cat-btn bg-white text-gray-600 px-6 py-2.5 rounded-full font-bold text-sm whitespace-nowrap shadow-sm hover:bg-green-50 transition-all border border-gray-100";
                }
            });
            filterProducts();
        }

        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                const cat = card.getAttribute('data-category');
                const matchesSearch = name.includes(query);
                const matchesCategory = currentCategory === 'All' || cat === currentCategory;
                
                if(matchesSearch && matchesCategory) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function openTrackModal() {
            const modal = document.getElementById('track-modal');
            const content = document.getElementById('track-content');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('translate-y-full'); }, 10);
        }
        function closeTrackModal() {
            const modal = document.getElementById('track-modal');
            const content = document.getElementById('track-content');
            modal.classList.add('opacity-0'); content.classList.add('translate-y-full');
            setTimeout(() => { modal.classList.add('hidden'); document.getElementById('track-results').innerHTML=''; }, 300);
        }
        
        async function fetchTracking() {
            const phone = document.getElementById('track-phone').value;
            const results = document.getElementById('track-results');
            if(!phone) return;
            results.innerHTML = '<p class="text-center text-sm text-gray-400"><i class="ph-bold ph-spinner animate-spin text-2xl"></i></p>';
            
            const res = await fetch(`/api/track/${phone}`);
            const data = await res.json();
            
            if(data.length === 0) {
                results.innerHTML = '<div class="p-4 bg-red-50 text-red-600 rounded-xl text-sm font-bold text-center">No orders found for this number.</div>';
            } else {
                results.innerHTML = data.map(o => `
                    <div class="p-4 border border-gray-100 rounded-xl bg-gray-50 relative overflow-hidden">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-${o.status.includes('Delivered')?'green':o.status.includes('Shipped')?'blue':'yellow'}-500"></div>
                        <p class="text-xs text-gray-400 font-bold mb-1">ID: ${o.id}</p>
                        <p class="font-extrabold text-gray-900">${o.product_name}</p>
                        <div class="mt-3 flex items-center gap-2">
                            <span class="px-3 py-1 bg-white border border-gray-200 rounded-full text-xs font-black uppercase text-gray-700 shadow-sm">${o.status}</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        function openModal(name, price) {
            document.getElementById('modal-prod-name').value = name;
            document.getElementById('display-prod-name').innerText = name;
            document.getElementById('display-prod-price').innerText = '₹' + price;
            const modal = document.getElementById('payment-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('translate-y-full'); }, 10);
        }
        function closeModal() { 
            const modal = document.getElementById('payment-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('opacity-0'); content.classList.add('translate-y-full');
            setTimeout(() => { modal.classList.add('hidden'); document.getElementById('checkout-form').reset(); document.getElementById('upload-ui').className="bg-green-100 text-green-700 font-bold py-2.5 rounded-xl text-sm flex items-center justify-center gap-2 transition-all"; document.getElementById('upload-ui').innerHTML='<i class="ph-bold ph-upload-simple text-lg"></i> Upload Screenshot'; }, 300);
        }

        document.getElementById('screenshot-input').addEventListener('change', function(e) {
            const ui = document.getElementById('upload-ui');
            if(e.target.files.length > 0) {
                ui.className = "bg-green-500 text-white font-bold py-2.5 rounded-xl text-sm shadow-md transition-all flex items-center justify-center gap-2";
                ui.innerHTML = '<i class="ph-bold ph-check-circle text-lg"></i> Uploaded ✅';
            }
        });

        document.getElementById('checkout-form').addEventListener('submit', function() {
            document.getElementById('submit-btn').classList.add('opacity-75', 'pointer-events-none');
            document.getElementById('submit-text').innerText = 'Processing...';
        });
    </script>
</body>
</html>
