<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .smooth-shadow { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
    </style>
</head>
<body class="text-gray-800 pb-12">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50 smooth-shadow">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gray-900 rounded-xl flex items-center justify-center text-white"><i class="ph-bold ph-buildings text-xl"></i></div>
                <div><h1 class="text-lg font-extrabold leading-none">Command Center</h1></div>
            </div>
            <a href="./index1.html" class="bg-red-50 hover:bg-red-100 text-red-600 px-5 py-2 rounded-full font-bold text-sm transition-colors"><i class="ph-bold ph-sign-out"></i> Logout</a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 mt-10 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 space-y-8">
            <div class="bg-white p-6 rounded-[2rem] smooth-shadow border border-gray-50">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><i class="ph-fill ph-package text-green-500"></i> New Product</h2>
                <form action="#" onsubmit="alert('Forms do not work on static GitHub pages.'); return false;" class="space-y-4">
                    <input type="text" name="name" placeholder="Product Name" required class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm font-medium">
                    <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg hover:bg-green-700">Publish Product (Demo)</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-[2rem] smooth-shadow border border-gray-50">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="ph-fill ph-list-dashes text-red-500"></i> Inventory</h2>
                <div class="space-y-2 max-h-64 overflow-y-auto pr-2">
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border border-gray-100">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-gray-200 rounded-lg flex items-center justify-center">🌱</div>
                            <div><p class="font-bold text-sm text-gray-900 leading-tight">Premium Fertilizer</p><p class="text-[10px] font-black uppercase text-gray-400">Fertilizers</p></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-8">
            <div class="bg-white p-8 rounded-[2rem] smooth-shadow border border-gray-50">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-xl font-bold flex items-center gap-2"><i class="ph-fill ph-receipt text-blue-500"></i> Active Orders</h2>
                    <span class="bg-gray-100 px-3 py-1 rounded-full text-xs font-bold">1 Total</span>
                </div>
                
                <div class="space-y-4">
                    <div class="flex flex-col sm:flex-row gap-6 p-5 bg-white border border-gray-100 rounded-[1.5rem] smooth-shadow relative">
                        <div class="flex-1">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h3 class="font-black text-lg text-gray-900">Premium Fertilizer</h3>
                                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">ID: 001 • Today</p>
                                </div>
                                <span class="text-xs font-bold bg-yellow-50 text-yellow-600 border border-yellow-200 rounded-lg px-2 py-1">Pending</span>
                            </div>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4 bg-gray-50 p-3 rounded-xl border border-gray-100">
                                <div>
                                    <p class="text-xs font-bold text-gray-400 uppercase">Customer Info</p>
                                    <p class="text-sm font-semibold text-gray-800"><i class="ph-fill ph-user text-gray-400 mr-1"></i> John Doe</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
